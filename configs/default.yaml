# Dataset
dataset: celeba
data_dir: data
image_size: 64
crop_size: 148
channels: 3

# Model
latent_dim: 256
encoder_channels: [64, 128, 256, 512]
decoder_channels: [512, 256, 128, 64]

# Training
batch_size: 128
epochs: 50
lr: 3.0e-4
weight_decay: 1.0e-5
optimizer: adamw
scheduler: cosine

# Stability
kl_warmup_epochs: 20
grad_clip_max_norm: 5.0

# Reproducibility
seed: 42
num_workers: 4

# Outputs
output_dir: outputs
checkpoint_every: 10
sample_every: 5
